[package]
name        = "engram-core"
description = "VSA-based persistent geometric memory for AI agents — core types and operations"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
rayon-backend = []     # Enable Rayon parallel scan (always available on CPU)
ast = ["dep:syn", "dep:proc-macro2"]  # Enable syn-based AST extraction for Rust source ingestion

[dependencies]

num-complex  = { workspace = true }
blake3       = { workspace = true }
bytemuck     = { workspace = true }
rayon        = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
anyhow       = { workspace = true }
thiserror    = { workspace = true }
reqwest      = { workspace = true }
tracing      = { workspace = true }

libc         = "0.2"   # O_DIRECT flag for direct I/O reads
# AST extraction — optional, enabled via the `ast` feature
syn          = { version = "2", features = ["full", "visit"], optional = true }
proc-macro2  = { version = "1", features = ["span-locations"], optional = true }
