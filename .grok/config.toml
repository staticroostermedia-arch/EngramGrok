# Project-scoped MCP for Engram (higher priority than global ~/.grok/config.toml)
# When in this directory or subdirs, these override/add to global MCP servers.

[mcp_servers.filesystem-eng]
command = "/home/a/.npm-global/bin/mcp-server-filesystem"
args = ["/home/a/Documents/Engram", "/home/a/.engram/stalks", "/home/a/Documents/CodeLand"]
enabled = true

[mcp_servers.git-eng]
command = "/home/a/.local/bin/uvx"
args = ["mcp-server-git", "--repository", "/home/a/Documents/Engram"]
enabled = true

# The Engram memory system (the .leg/.leg3 geometric + thermodynamic primitives)
# is explicitly designed for AI agents to use as persistent, self-verifying long-term
# memory. Grok is configured (via the engram-grok wrapper) to use the same manifold
# with full CudaBackend + BVH acceleration that Antigravity uses.

# Global engram MCP (powered by the dedicated wrapper) is inherited and preferred.
# It gives this agent the same sovereign .leg primitive access as other agents on the system.
