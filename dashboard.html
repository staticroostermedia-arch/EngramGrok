<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engram — Geometric Memory Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #1a1a26;
  --bg-card-hover: #222233;
  --border: #2a2a3a;
  --text-primary: #e8e8f0;
  --text-secondary: #8888aa;
  --text-muted: #555570;
  --accent-cyan: #00d4ff;
  --accent-purple: #8b5cf6;
  --accent-green: #10b981;
  --accent-amber: #f59e0b;
  --accent-red: #ef4444;
  --glow-cyan: 0 0 20px rgba(0,212,255,0.15);
  --glow-purple: 0 0 20px rgba(139,92,246,0.15);
  --radius: 12px;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
/* ── Header ── */
.header {
  background: linear-gradient(135deg, #0d0d18 0%, #1a1028 50%, #0d1520 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
}
.header-left { display:flex; align-items:center; gap:16px; }
.logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #fff;
  box-shadow: var(--glow-cyan);
}
.header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.header h1 span { color: var(--accent-cyan); }
.header-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-secondary);
  font-family: var(--font-mono);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 8px var(--accent-green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Layout ── */
.container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.full-width { grid-column: 1 / -1; }

/* ── Cards ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.2s ease;
}
.card:hover { border-color: #3a3a4a; }
.card-title {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .icon { font-size: 16px; }

/* ── Stats ── */
.stat-value {
  font-size: 36px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1.1;
}
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ── Memory list ── */
.memory-list { max-height: 500px; overflow-y: auto; }
.memory-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: 8px;
  border: 1px solid transparent;
  transition: all 0.15s ease; cursor: pointer;
  margin-bottom: 4px;
}
.memory-item:hover { background: var(--bg-card-hover); border-color: var(--border); }
.memory-name {
  font-family: var(--font-mono); font-size: 13px; font-weight: 500;
  color: var(--accent-cyan);
}
.memory-crs {
  font-family: var(--font-mono); font-size: 12px;
  padding: 2px 8px; border-radius: 4px;
  background: rgba(16,185,129,0.12); color: var(--accent-green);
}
.memory-crs.low { background: rgba(245,158,11,0.12); color: var(--accent-amber); }
.memory-crs.critical { background: rgba(239,68,68,0.12); color: var(--accent-red); }

/* ── Search / Input ── */
.input-group { position: relative; margin-bottom: 12px; }
.input-group input, .input-group textarea {
  width: 100%; padding: 12px 16px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary);
  font-family: var(--font-sans); font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.input-group textarea { min-height: 80px; resize: vertical; }
.input-group input:focus, .input-group textarea:focus {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
}
.input-group input::placeholder, .input-group textarea::placeholder { color: var(--text-muted); }

.btn {
  padding: 10px 20px; border: none; border-radius: 8px;
  font-family: var(--font-sans); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; display: inline-flex;
  align-items: center; gap: 6px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent-cyan), #0090b3);
  color: #fff; box-shadow: var(--glow-cyan);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.25); }
.btn-secondary {
  background: var(--bg-secondary); border: 1px solid var(--border);
  color: var(--text-secondary);
}
.btn-secondary:hover { border-color: var(--accent-cyan); color: var(--text-primary); }
.btn-danger {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  color: var(--accent-red);
}
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-group { display: flex; gap: 8px; margin-top: 12px; }

/* ── Results ── */
.result-item {
  padding: 14px; margin-bottom: 8px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; transition: all 0.2s;
}
.result-item:hover { border-color: var(--accent-purple); }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.result-concept { font-family: var(--font-mono); font-weight: 600; color: var(--accent-purple); font-size: 14px; }
.result-score { font-family: var(--font-mono); font-size: 12px; color: var(--accent-cyan); }
.result-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

/* ── Detail panel ── */
.detail-panel {
  position: fixed; right: -500px; top: 0; bottom: 0; width: 480px;
  background: var(--bg-card); border-left: 1px solid var(--border);
  z-index: 200; transition: right 0.3s ease; padding: 24px;
  overflow-y: auto;
  box-shadow: -10px 0 40px rgba(0,0,0,0.5);
}
.detail-panel.open { right: 0; }
.detail-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; color: var(--text-muted);
  font-size: 24px; cursor: pointer;
}
.detail-close:hover { color: var(--text-primary); }
.detail-concept {
  font-family: var(--font-mono); font-size: 18px; font-weight: 700;
  color: var(--accent-cyan); margin-bottom: 16px; margin-top: 8px;
}
.detail-text {
  font-size: 14px; line-height: 1.7; color: var(--text-secondary);
  background: var(--bg-secondary); padding: 16px; border-radius: 8px;
  font-family: var(--font-mono); white-space: pre-wrap; word-break: break-word;
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 12px 20px; border-radius: 8px;
  background: var(--bg-card); border: 1px solid var(--accent-green);
  color: var(--accent-green); font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  transform: translateY(100px); opacity: 0;
  transition: all 0.3s ease; z-index: 300;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-color: var(--accent-red); color: var(--accent-red); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* ── Loading ── */
.loading { text-align: center; padding: 40px; color: var(--text-muted); }
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent-cyan); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 900px) { .grid, .grid-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">E</div>
    <h1><span>Engram</span> Dashboard</h1>
  </div>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</header>

<div class="container">
  <!-- Stats Row -->
  <div class="grid-3" id="statsRow">
    <div class="card">
      <div class="card-title"><span class="icon">🧠</span> Memories</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Total concepts in manifold</div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">📌</span> Pinned</div>
      <div class="stat-value" id="statPinned">—</div>
      <div class="stat-label">Immortal (CRS = 1.0)</div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">💾</span> Disk</div>
      <div class="stat-value" id="statDisk">—</div>
      <div class="stat-label">Manifold size</div>
    </div>
  </div>

  <div class="grid">
    <!-- Left: Memory List -->
    <div class="card">
      <div class="card-title"><span class="icon">📂</span> Memory Manifold</div>
      <div class="memory-list" id="memoryList">
        <div class="loading"><div class="spinner"></div>Loading manifold...</div>
      </div>
    </div>

    <!-- Right: Recall -->
    <div class="card">
      <div class="card-title"><span class="icon">🔍</span> Recall — Semantic Query</div>
      <div class="input-group">
        <input type="text" id="recallInput" placeholder="Ask the manifold anything..." />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="doRecall()">⚡ Recall</button>
      </div>
      <div id="recallResults" style="margin-top:16px;"></div>
    </div>
  </div>

  <div class="grid">
    <!-- Remember -->
    <div class="card">
      <div class="card-title"><span class="icon">✨</span> Remember — Store New Memory</div>
      <div class="input-group">
        <input type="text" id="rememberConcept" placeholder="Concept name (e.g. monad_physics)" />
      </div>
      <div class="input-group">
        <textarea id="rememberText" placeholder="Memory text — what should Engram remember?"></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="doRemember()">💾 Store</button>
      </div>
    </div>

    <!-- Trace -->
    <div class="card">
      <div class="card-title"><span class="icon">🔮</span> Trace — VSA Operations</div>
      <div class="input-group">
        <input type="text" id="traceA" placeholder="Term A (concept name or text)" />
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="btn btn-secondary" id="traceOpAdd" onclick="setTraceOp('ADD')" style="flex:1;">ADD ⊕</button>
        <button class="btn btn-secondary" id="traceOpBind" onclick="setTraceOp('BIND')" style="flex:1;">BIND ⊗</button>
      </div>
      <div class="input-group">
        <input type="text" id="traceB" placeholder="Term B (concept name or text)" />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="doTrace()">🔮 Trace</button>
      </div>
      <div id="traceResults" style="margin-top:16px;"></div>
    </div>
  </div>
</div>

<!-- Detail Slide Panel -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">×</button>
  <div class="card-title"><span class="icon">🔬</span> Memory Detail</div>
  <div class="detail-concept" id="detailConcept"></div>
  <div class="detail-text" id="detailText"></div>
  <div class="btn-group" style="margin-top:16px;">
    <button class="btn btn-danger" id="detailForgetBtn">🗑 Forget</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'http://127.0.0.1:3000';
let currentTraceOp = 'ADD';
let allConcepts = [];

// ── API Helpers ──
async function api(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    return await res.json();
  } catch(e) {
    setStatus(false);
    throw e;
  }
}

function setStatus(ok) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (ok) {
    dot.style.background = 'var(--accent-green)';
    dot.style.boxShadow = '0 0 8px var(--accent-green)';
    txt.textContent = 'Metal GPU · 127.0.0.1:3000';
  } else {
    dot.style.background = 'var(--accent-red)';
    dot.style.boxShadow = '0 0 8px var(--accent-red)';
    txt.textContent = 'Disconnected';
  }
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 3000);
}

// ── Load Stats ──
async function loadStats() {
  try {
    // Parse stats from MCP since REST doesn't have a stats endpoint natively
    const list = await api('GET', '/api/list');
    setStatus(true);
    allConcepts = list;
    document.getElementById('statTotal').textContent = list.length;
    document.getElementById('statPinned').textContent = '—';
    document.getElementById('statDisk').textContent = (list.length * 256).toFixed(0) + ' KB';
  } catch(e) {
    setStatus(false);
  }
}

// ── Load Memory List ──
async function loadMemories() {
  try {
    const list = await api('GET', '/api/list');
    setStatus(true);
    allConcepts = list;
    const el = document.getElementById('memoryList');
    if (!list.length) {
      el.innerHTML = '<div class="loading">No memories in manifold</div>';
      return;
    }
    el.innerHTML = list.map(name => {
      const isGenesis = name.startsWith('genesis_');
      const isADR = name.startsWith('ADR-');
      const isLib = name.includes('lib_rs') || name.includes('_part');
      let badge = 'memory-crs';
      let label = '1.00';
      if (isGenesis) { label = 'PRAXIS'; }
      else if (isADR) { label = 'ADR'; badge += ' low'; }
      else if (isLib) { label = 'SOURCE'; badge += ' low'; }

      return `<div class="memory-item" onclick="showDetail('${name}')">
        <span class="memory-name">${name}</span>
        <span class="${badge}">${label}</span>
      </div>`;
    }).join('');
    document.getElementById('statTotal').textContent = list.length;
    document.getElementById('statDisk').textContent = (list.length * 256).toFixed(0) + ' KB';
  } catch(e) {
    document.getElementById('memoryList').innerHTML = '<div class="loading" style="color:var(--accent-red)">Cannot connect to Engram server</div>';
    setStatus(false);
  }
}

// ── Show Detail Panel ──
async function showDetail(concept) {
  const panel = document.getElementById('detailPanel');
  document.getElementById('detailConcept').textContent = concept;
  document.getElementById('detailText').textContent = 'Loading...';
  panel.classList.add('open');

  try {
    const results = await api('POST', '/api/recall', { query: concept, k: 1 });
    if (results.length) {
      document.getElementById('detailText').textContent = results[0].text || '(empty)';
    } else {
      document.getElementById('detailText').textContent = '(no content found)';
    }
  } catch(e) {
    document.getElementById('detailText').textContent = 'Error loading: ' + e.message;
  }

  document.getElementById('detailForgetBtn').onclick = async () => {
    if (confirm(`Forget "${concept}" permanently?`)) {
      await api('POST', '/api/forget', { concept });
      toast(`✓ Forgotten: ${concept}`);
      closeDetail();
      loadMemories();
    }
  };
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

// ── Recall ──
async function doRecall() {
  const query = document.getElementById('recallInput').value.trim();
  if (!query) return;
  const el = document.getElementById('recallResults');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Querying manifold...</div>';
  try {
    const results = await api('POST', '/api/recall', { query, k: 5 });
    if (!results.length) {
      el.innerHTML = '<div class="loading">No results</div>';
      return;
    }
    el.innerHTML = results.map(r => `
      <div class="result-item" onclick="showDetail('${r.concept}')">
        <div class="result-header">
          <span class="result-concept">${r.concept}</span>
          <span class="result-score">cos: ${r.score.toFixed(4)} · crs: ${r.crs.toFixed(2)}</span>
        </div>
        <div class="result-text">${(r.text || '').substring(0, 200)}${(r.text||'').length > 200 ? '...' : ''}</div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = '<div class="loading" style="color:var(--accent-red)">Query failed</div>';
  }
}

// Recall on Enter
document.getElementById('recallInput').addEventListener('keydown', e => { if (e.key === 'Enter') doRecall(); });

// ── Remember ──
async function doRemember() {
  const concept = document.getElementById('rememberConcept').value.trim();
  const text = document.getElementById('rememberText').value.trim();
  if (!concept || !text) { toast('Concept and text required', true); return; }
  try {
    await api('POST', '/api/remember', { concept, text });
    toast(`✓ Remembered: ${concept}`);
    document.getElementById('rememberConcept').value = '';
    document.getElementById('rememberText').value = '';
    loadMemories();
  } catch(e) { toast('Store failed: ' + e.message, true); }
}

// ── Trace ──
function setTraceOp(op) {
  currentTraceOp = op;
  document.getElementById('traceOpAdd').className = 'btn ' + (op === 'ADD' ? 'btn-primary' : 'btn-secondary');
  document.getElementById('traceOpBind').className = 'btn ' + (op === 'BIND' ? 'btn-primary' : 'btn-secondary');
}
setTraceOp('ADD');

async function doTrace() {
  const a = document.getElementById('traceA').value.trim();
  const b = document.getElementById('traceB').value.trim();
  if (!a || !b) { toast('Both terms required', true); return; }
  const el = document.getElementById('traceResults');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Computing trace...</div>';
  try {
    const results = await api('POST', '/api/trace', { term_a: a, op: currentTraceOp, term_b: b, k: 5 });
    if (!results.length) { el.innerHTML = '<div class="loading">No results</div>'; return; }
    el.innerHTML = results.map(r => `
      <div class="result-item">
        <div class="result-header">
          <span class="result-concept">${r.concept}</span>
          <span class="result-score">sim: ${r.score.toFixed(4)}</span>
        </div>
      </div>
    `).join('');
  } catch(e) { el.innerHTML = '<div class="loading" style="color:var(--accent-red)">Trace failed</div>'; }
}

// ── Boot ──
loadStats();
loadMemories();
setInterval(loadStats, 30000);
</script>
</body>
</html>
